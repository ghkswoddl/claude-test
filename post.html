<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Post — my-blog</title>
  <script>
    (function () {
      var saved = localStorage.getItem("theme");
      if (saved === "dark" || saved === "light") {
        document.documentElement.setAttribute("data-theme", saved);
      }
    })();
  </script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/layout.css" />
  <link rel="stylesheet" href="styles/components.css" />
</head>
<body>
  <header class="container">
    <nav class="top-nav">
      <a class="brand" href="index.html">my-blog</a>
      <div class="nav-menu">
        <a class="nav-link" href="index.html">Posts</a>
      </div>
      <div class="nav-actions">
        <button id="theme-toggle" class="button-icon-circular theme-toggle" type="button" aria-pressed="false" aria-label="Switch to dark mode">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3 7 7 0 0 0 21 12.8Z"/></svg>
        </button>
        <button id="nav-hamburger" class="button-icon-circular nav-hamburger" type="button" aria-label="Open menu">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 6h18M3 12h18M3 18h18"/></svg>
        </button>
      </div>
    </nav>
    <div id="nav-mobile-sheet" class="nav-mobile-sheet">
      <a class="nav-link" href="index.html">Posts</a>
    </div>
  </header>

  <main class="hero-band container">
    <a class="text-link" href="index.html">&larr; Back to all posts</a>
    <h1 id="hero-title" class="hero-title text-display-lg" style="margin-top: 16px;">Loading…</h1>
    <div id="hero-meta" class="hero-meta"></div>
  </main>

  <section class="page-body container">
    <article id="post-body" class="post-body"></article>
  </section>

  <footer class="footer container">
    <p class="footer-text">© 2026 my-blog. Built with plain HTML, CSS, and JavaScript.</p>
  </footer>

  <script type="module" src="js/post-page.js"></script>
</body>
</html>
